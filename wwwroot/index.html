<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Tutor</title>
    <base href="/" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="Tutor.styles.css" />
    <link rel="icon" href="data:,">
</head>

<body>

    <div class="status-bar-safe-area"></div>

    <div id="app">Loading...</div>

    <div id="blazor-error-ui" data-nosnippet>
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>
    <script>
        function autoGrowTextarea(element) {
            if (element) {
                element.style.height = 'auto';
                element.style.height = Math.min(element.scrollHeight, 200) + 'px';
            }
        }
        function resetTextareaHeight(element) {
            if (element) {
                element.style.height = 'auto';
            }
        }
        function setupTextareaEnterHandler(element, dotNetRef) {
            if (element) {
                element.addEventListener('keydown', async function(e) {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        await dotNetRef.invokeMethodAsync('SendFromJs');
                    }
                });
            }
        }
    </script>

</body>

</html>
